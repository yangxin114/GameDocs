  var ni=ci.filter(function(i){return i.section==='new'}),ui=ci.filter(function(i){return i.section==='updated'});
  var id='sec-'+cls.toLowerCase().replace(' ','-'),tag=CTAG[cls]||'class-all',cn=CNAME[cls]||cls,icon=CICON[cls]||'&#x2694;';
  sb+='<a class="nav-item" href="#'+id+'"><span class="nav-icon">'+icon+'</span> '+cn+'</a>';

  var h='<section class="section" id="'+id+'"><div class="section-header"><span class="class-badge '+tag+'">'+cn+'</span><h2 class="section-title">'+cn+'</h2><p class="section-desc">新增 '+ni.length+' 件 + 重做 '+ui.length+' 件暗金装备</p></div>';
  h+='<div class="items-grid">';
  ci.forEach(function(it){h+=card(it)});
  h+='</div></section>';secHtml+=h;
});

sb+='<div class="sidebar-footer"><a href="index.html">&#x2190; 返回D4首页</a><br><span>&#xA9;</span> 2026 看雲起雲落</div>';
document.getElementById('sidebar').innerHTML=sb;
document.getElementById('sections').innerHTML=secHtml;

// Init filter count
setTimeout(function(){applyFilters()},100);

var links=document.querySelectorAll('#sidebar .nav-item'),secs=[];
links.forEach(function(l){var id=l.getAttribute('href').replace('#',''),s=document.getElementById(id);if(s)secs.push({l:l,s:s})});
function upd(){var y=window.pageYOffset+120,c=null;secs.forEach(function(x){if(x.s.offsetTop<=y)c=x.l});links.forEach(function(l){l.classList.remove('active')});if(c)c.classList.add('active')}
window.addEventListener('scroll',upd,{passive:true});upd();

// ====== FILTER LOGIC ======
var currentMainFilter='all';
var selectedRarities=['mythic','unique'];

// Build equipment type checkboxes
var typeNames=['Helm','Chest Armor','Gloves','Pants','Boots','Amulet','Ring','Shield','1h Sword','2h Sword','1h Mace','2h Mace','1h Axe','1h Dagger','Bow','Staff','Totem','Focus','Wand','Glaive'];
var typeContainer=document.getElementById('filterType');
typeNames.forEach(function(t){
  var lbl=document.createElement('label');
  lbl.className='filter-opt sel';
  lbl.setAttribute('onclick','toggleType(this)');
  lbl.innerHTML='<input type="checkbox" checked value="'+esc(t)+'"> '+(TYPECN[t]||t);
  typeContainer.appendChild(lbl);
});

function getTypeFromTypeStr(t){return t.replace(/Mythic Unique /i,'').replace(/Unique /i,'').trim();}
function getRarityFromTypeStr(t){return t.indexOf('Mythic')!==-1?'mythic':'unique';}

window.setMainFilter=function(val,el){
  currentMainFilter=val;
  document.querySelectorAll('.filter-opt-radio').forEach(function(r){r.classList.remove('active')});
  el.classList.add('active');
  applyFilters();
};

window.toggleRarity=function(lbl){
  var cb=lbl.querySelector('input');
  if(cb.checked)lbl.classList.add('sel');else lbl.classList.remove('sel');
  selectedRarities=[];
  document.querySelectorAll('#filterRarity input:checked').forEach(function(c){selectedRarities.push(c.value)});
  applyFilters();
};

window.toggleType=function(lbl){
  var cb=lbl.querySelector('input');
  if(cb.value==='all'){
    var allChecked=cb.checked;
    document.querySelectorAll('#filterType input').forEach(function(c){c.checked=allChecked});
    document.querySelectorAll('#filterType .filter-opt').forEach(function(o){if(allChecked)o.classList.add('sel');else o.classList.remove('sel')});
  }else{
    if(cb.checked)lbl.classList.add('sel');else lbl.classList.remove('sel');
    var all=document.querySelector('#filterType input[value="all"]');
    var allChecked=document.querySelectorAll('#filterType input:not([value="all"])').length===document.querySelectorAll('#filterType input:not([value="all"]):checked').length;
    all.checked=allChecked;
    if(allChecked)all.parentElement.classList.add('sel');else all.parentElement.classList.remove('sel');
  }
  applyFilters();
};

window.resetFilters=function(){
  currentMainFilter='all';
  document.querySelectorAll('.filter-opt-radio').forEach(function(r){r.classList.remove('active')});
  document.querySelector('.filter-opt-radio[data-filter="all"]').classList.add('active');
  document.querySelectorAll('#filterRarity input').forEach(function(c){c.checked=true});
  document.querySelectorAll('#filterRarity .filter-opt').forEach(function(o){o.classList.add('sel')});
  document.querySelectorAll('#filterType input').forEach(function(c){c.checked=true});
  document.querySelectorAll('#filterType .filter-opt').forEach(function(o){o.classList.add('sel')});
  selectedRarities=['mythic','unique'];
  applyFilters();
};

function applyFilters(){
  var cards=document.querySelectorAll('.eq-card');
  var visibleCount=0;
  cards.forEach(function(card){
    var section=card.getAttribute('data-section')||'';
    var rarity=card.getAttribute('data-rarity')||'';
    var eqType=card.getAttribute('data-type')||'';
    var typeMatch=true;
    var typeChecked=document.querySelectorAll('#filterType input:not([value="all"]):checked');
    if(typeChecked.length>0){
      var typeValues=[];
      typeChecked.forEach(function(c){typeValues.push(c.value)});
      typeMatch=typeValues.indexOf(eqType)!==-1;
    }
    var rarityMatch=selectedRarities.indexOf(rarity)!==-1;
    var mainMatch=currentMainFilter==='all'||section===currentMainFilter;
    var show=mainMatch&&rarityMatch&&typeMatch;
    if(show){card.classList.remove('hidden');visibleCount++}else{card.classList.add('hidden')}
  });
  document.getElementById('filterCount').textContent='显示 '+visibleCount+' / '+cards.length+' 件';
}

function fmt(text){
  if(!text)return '';
  // 括号数值 -> 白色加粗
  text=text.replace(/\[([^\]]+)\]/g,'<span class="num">[$1]</span>');
  // x 倍率数值 -> 白色加粗
  text=text.replace(/x([\d.]+%?)/g,'<span class="num">x$1</span>');
  // +数值（如 +18.0%, +33%, +3, +66, +30 等）-> 白色加粗
  text=text.replace(/\+([\d,.]+%?)/g,'<span class="num">+$1</span>');
  // -数值（负数属性）-> 白色加粗
  text=text.replace(/-([\d,.]+%?)/g,'<span class="num">-$1</span>');
  // 独立数字（如 3,454、20秒、15秒等）-> 白色加粗
  text=text.replace(/([\d,]+\.?\d*)/g,'<span class="num">$1</span>');
  return text;
}
function card(it){
  var nc=it.is_mythic?'eq-name mythic':'eq-name';
  var fc=it.is_mythic?'eq-frame eq-frame-mythic':'eq-frame eq-frame-unique';
  var ec=it.is_mythic?'item-effect item-effect-mythic':'item-effect item-effect-unique';
  var ac=it.is_mythic?'eq-affixes eq-affix-mythic':'eq-affixes eq-affix-unique';
  var tag=(it.section==='updated'||it.section==='reworked')?'<span class="tag-upd">重做</span>':'<span class="tag-new">NEW</span>';
  var eqTypeBase=getTypeFromTypeStr(it.type||'');
  var eqRarity=getRarityFromTypeStr(it.type||'');
  var imgHtml=it.img?'<div class="eq-icon"><img src="../../assets/images/diablo4/unique/'+esc(it.img.replace(/ /g,'_'))+'" alt="'+esc(it.cn)+'" onerror="this.parentElement.style.display=\'none\'"></div>':'';
  var h='<div class="eq-card" data-section="'+esc(it.section||'new')+'" data-rarity="'+esc(eqRarity)+'" data-type="'+esc(eqTypeBase)+'"><div class="'+fc+'">'+imgHtml+'<div class="eq-header"><span class="'+nc+'">'+esc(it.cn)+'</span></div>';
  h+='<div class="eq-meta"><span class="eq-type">'+esc(getTypeCn(it.type))+'</span>'+tag;
  h+='<span class="eq-en">'+esc(it.name)+'</span></div>';

  // Affixes - show old/new comparison for updated items
  if(it.section==='updated'&&it.old_affixes&&it.old_affixes.length){
    h+='<div class="'+ac+'"><p class="eq-affix-title">&#x1F527; 词缀对比</p>';
    // Show old affixes
    h+='<p class="eq-effect-title">&#x1F4DC; 更新前</p>';
    it.old_affixes.forEach(function(a){h+='<p class="eq-affix-row old">'+fmt(esc(a))+'</p>'});
    // Show new affixes
    h+='<p class="eq-effect-title" style="margin-top:6px;color:'+(it.is_mythic?'#c080e0':'var(--gold)')+'">&#x2728; 更新后</p>';
    if(it.affixes&&it.affixes.length){
      it.affixes.forEach(function(a){h+='<p class="eq-affix-row">'+fmt(esc(a))+'</p>'});
    }else{
      h+='<p class="eq-affix-row" style="font-style:italic;color:var(--text-dim)">词缀属性未知，待定</p>';
    }
    h+='</div>';
  }else if(it.affixes&&it.affixes.length){
    h+='<div class="'+ac+'"><p class="eq-affix-title">&#x1F527; 词缀</p>';
    it.affixes.forEach(function(a){h+='<p class="eq-affix-row">'+fmt(esc(a))+'</p>'});
    h+='</div>';
  }else{
    h+='<div class="'+ac+'"><p class="eq-affix-row" style="font-style:italic;color:var(--text-dim)">词缀属性未知，待定</p></div>';
  }

  // Effects - show old/new comparison for updated items
  var tc=it.is_mythic?'color:#c080e0':'color:var(--gold)';
  h+='<div class="eq-effect">';
  if(it.section==='updated'||it.section==='reworked'){
    var ef=it.old_effect||'';
    if(ef)h+='<p class="eq-effect-title">&#x1F4DC; 更新前</p><p class="item-effect old">'+fmt(ef)+'</p>';
    if(it.effect)h+='<p class="eq-effect-title" style="margin-top:6px;color:'+tc+'">&#x2728; 更新后</p><p class="'+ec+'">'+fmt(it.effect)+'</p>';
  }else if(it.effect){
    h+='<p class="'+ec+'">'+fmt(it.effect)+'</p>';
  }
  h+='</div>';

  return h+'</div></div></div>';
}
})();
</script>
